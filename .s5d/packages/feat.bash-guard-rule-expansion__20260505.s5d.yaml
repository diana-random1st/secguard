id: feat.bash-guard-rule-expansion
version: 1.0.0
product: secguard
tier: standard
allow_update: true
meta:
  title: bash-guard rule-family expansion (RAN-355 substitute, AST-free)
  authors: [random1st]
  date: 2026-05-05
  tickets: []
  adrs: []
  renames: []
context: |
  ## Problem

  After RAN-353 (798130b) + RAN-354 (3aa08c2), bash-guard fixture baseline
  is 98/155 (63.2%). Of the 57 failures, ~40 are missing rule families, ~12
  are wrapper-FN cases, ~10 are substring FPs. This feature closes the
  rule-family bucket via heuristic.rs extensions. Wrapper FN stays
  conservatively covered by the existing substring fallback (asks on any
  `rm -rf`), which is OK because the FN class becomes Destructive-by-FP,
  not Safe-by-FN.

  ## Goal

  Bring fixture baseline from 98/155 → 130+/155 (84%+) by adding 8 rule
  families to heuristic.rs and tightening the substring fallback to skip
  content inside `git commit -m`-style quoted args.

  Concrete rules to add (one PR per family or batched 2-3):
    1. Supabase ORM migrations: alembic, prisma migrate deploy, drizzle-kit
       push, knex migrate:latest, goose up
    2. Terraform / OpenTofu: apply, destroy
    3. Redis destructive: FLUSHALL, FLUSHDB, SHUTDOWN, MIGRATE
    4. Mongo destructive: db.dropDatabase(), db.X.drop(), deleteMany({})
    5. ES/OpenSearch: HTTP DELETE + _delete_by_query mutations
    6. Extra cloud CLIs: gsutil rm, oci compute terminate, ibmcloud cluster
       rm, doctl droplet/databases delete, linode-cli volume/linodes delete
    7. PaaS volumes/destroy: fly volumes destroy, railway down, railway
       service/volume delete
    8. Git history rewrite: filter-branch, filter-repo, BFG, push +refspec,
       push -d origin <ref>
    9. Substring-fallback tightening: skip `rm -rf` inside `git commit -m`
       quoted args and similar known-safe quoted contexts.

  ## Privacy
  Classification: Internal — telemetry stays local, no upstream upload.

  ## Decision provenance
  See `.s5d/packages/decision.next-on-bash-guard-parity__20260505.s5d.yaml`
  for the full rationale (winner: rule-family-expansion-first;
  ast-and-wrapper-unwrap deferred to RAN-355).
