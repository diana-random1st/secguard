problem:
  signal: |
    Variable indirection and command substitution in command position
    silently bypass the destructive-command guard. Headline case
    closed; 9 adjacent classes still produce false-negative `safe`
    or false-positive `destructive-by-leaked-scope`.
  constraints:
  - Guard semantics asymmetric — false positive (agent retries) cheap, false negative (destruction) catastrophic.
  - Tree-sitter-bash is the parser; no plan to rewrite as full bash interpreter.
  - Performance budget — guard runs synchronously on every agent shell call.
  - Existing rule predicate API (EffectiveCommand) must keep working.
  targets:
  - All 10 verified bypasses must classify `destructive` (either via resolution into a real argv that hits an existing rule, or via a synthetic marker that a rule flags).
  - No regression on the 323-test guard suite.
  - Legitimate `a="ls -la" && $a` and `$EDITOR file` patterns must NOT all flip to false positive — at least the substitution-resolves case must still pass through.
  indicators:
  - Synthetic test corpus covering all 10 bypasses + ≥10 negatives.
  - cargo test green on workspace (excluding pre-broken secguard-mcp).
  goodhart_guard: |
    Naive over-approximation (flag every $ or backtick as destructive)
    would pass the corpus but break legitimate `$EDITOR file`,
    `$PAGER`, `${HOME}/bin/foo`, etc. Indicators must include negative
    cases, not only the bypass corpus.
  acceptance: |
    The chosen AST contract is implemented; all 10 bypasses classify
    destructive; negative corpus stays safe; cargo test green;
    tribunal re-run on the implementation lands APPROVE.
  blast_radius: |
    crates/secguard-guard only. Public predicate API unchanged.
    Marker emission widens — downstream consumers that whitelist
    rule IDs may need to add new IDs.
  reversibility: |
    Reversible per change. Rule-id additions are additive. AST
    walker changes are local to ast.rs. Rollback = revert.
  status: in_review
hypotheses:
- id: per-class-enumeration-explicit-ast-recognition-for-each-indirection-construct
  title: 'Per-class enumeration: explicit AST recognition for each indirection construct'
  content: |-
    For each shell indirection construct (variable expansion, $(...), backtick, here-string, source/.,
    function call, eval), add explicit AST handling: resolve when statically possible (lexical bindings),
    emit synthetic marker when dynamic. Each new construct = one walker branch + one predicate rule.

    Mechanism: extend `Walker` with construct-specific handlers; widen `unwrap_wrapper` for source/here-string;
    add `command_substitution` and backtick recognition in `handle_command` argv assembly with marker emission.

    Trust level: every construct is enumerated; what isn't enumerated is silent-safe (false negative risk).
  scope: crates/secguard-guard/src/{ast.rs,rules.rs,rule_id.rs}
  kind: system
  layer: L0
  r_eff: null
  evidence:
  - id: 20260507-internal-per-class-enumeration-explicit-ast-recognition-for-each-indirection-construct
    type: internal
    content: |-
      Track record from the headline patch: enumerated 3 constructs (variable_assignment, $NAME/${NAME}, bash -c body expansion).
      Tribunal verified 9 additional constructs leak through. The enumeration approach scales linearly with shell
      constructs, but tree-sitter-bash exposes ~40 distinct node kinds for execution-relevant input shapes
      (command_substitution, process_substitution, here_redirect, herestring_redirect, function_definition,
      declaration_command (declare/local/typeset), namref via declare -n, brace_group, c_style_for_loop, ANSI-C
      $'...', $"..." i18n, parameter_expansion variants ${a:-x}/${a:=x}/${a:?x}/${a:+x}, etc.). Every miss is a bypass.
      The headline patch took ~3 commits and missed 9. Maintenance burden is real and historical evidence shows
      silent gaps recur.
    verdict: refine
    valid_until: 2026-08-05T20:02:51.335131+00:00
    carrier_ref: null
    formality: 3
    claim_scope:
    - maintenance burden
    - completeness
    congruence_level: null
    reliability: 0.8
    refine_kind: calibrate
  depends_on: []
  rationale: null
  spec_ref: null
  prompt: How should the AST recognize indirection — by enumerating each construct?
  next_move: build
- id: single-envelope-predicate-any-unresolvable-indirection-in-execution-position-is-destructive
  title: 'Single envelope predicate: any unresolvable indirection in execution position is destructive'
  content: |-
    Add ONE invariant at the AST level: a command is destructive if its head OR shell-input-body
    contains any expansion (`$`, `` ` ``, `<<<`, `<(`, `>(`, `$(`) that does NOT fully resolve to literal
    text via current bindings. No per-class enumeration; the walker emits `__indirect_unresolved__`
    whenever it sees an opaque construct in execution position, regardless of which construct.

    Mechanism: at the top of `handle_command`, scan tree-sitter children for any `simple_expansion`,
    `expansion`, `command_substitution`, `process_substitution`, or backtick descendant inside the
    command_name OR inside any redirect target. If any are present and `expand_vars(joined argv) → None`,
    emit the marker. Same logic applied uniformly to bash/sh/eval/source bodies.

    Allow-list: a small set of name-only resolutions for benign interactive commands (`$EDITOR`, `$PAGER`,
    `$BROWSER`, `$VISUAL`, `$SHELL` w/o -c) that resolve to a non-destructive head.

    Trust level: indirection is the rule; literal is the exception. New shell construct = no patch needed
    (envelope already covers it). Cost: more false positives on `$VAR` patterns the agent uses for paths
    that aren't in the allow-list.
  scope: crates/secguard-guard/src/{ast.rs,rules.rs,rule_id.rs}
  kind: system
  layer: L2
  r_eff: null
  evidence:
  - id: 20260507-internal-single-envelope-predicate-any-unresolvable-indirection-in-execution-position-is-destructive
    type: internal
    content: |-
      Existing precedent inside the codebase: `__pipe_to_shell__` and `__eval_dynamic__` markers ALREADY use
      the envelope pattern at narrow scope — they fire on any non-literal upstream feeding `| bash`, and on any
      dynamic body in `eval`. The pattern works (covers `curl URL | bash`, `eval $(cmd)`, etc.). Generalizing
      this single pattern to ALL execution-position indirection is consistent with the codebase, not a new
      paradigm. Additionally: secguard's threat model is explicitly asymmetric (CLAUDE-relevant comment in
      ast.rs:670-680 on eval_dynamic: "conservative ask is safer than silent allow") — envelope semantics
      match this stated principle.
    verdict: pass
    valid_until: 2026-08-05T20:03:03.560658+00:00
    carrier_ref: null
    formality: 3
    claim_scope:
    - consistency with codebase patterns
    - threat-model fit
    congruence_level: null
    reliability: 0.85
    refine_kind: null
  - id: 20260507-internal-single-envelope-predicate-any-unresolvable-indirection-in-execution-position-is-destructive
    type: internal
    content: |-
      False-positive cost analysis on the negative corpus implied by tribunal G1: legit `$EDITOR file`,
      `$PAGER log`, `$SHELL -i`, `${HOME}/bin/foo`, `cd $(pwd)`. Mitigations: (a) name-only resolution for
      `HOME`, `PWD`, `EDITOR`, `PAGER`, `VISUAL`, `BROWSER`, `SHELL` from process env at parse time —
      cheap and safe; (b) pure-prefix expansions where the envelope still parses to a fixed argv head
      (e.g. `${HOME}/cache` resolves to a literal path); (c) the marker is destructive-with-reason, not
      destructive-fatal — the agent's permission flow can still surface "indirect command, please confirm"
      rather than abort. Net: the false positive surface is a known, small, well-defined set, fixable with
      ~10 names + envvar lookup.
    verdict: pass
    valid_until: 2026-08-05T20:03:15.968010+00:00
    carrier_ref: null
    formality: 3
    claim_scope:
    - false-positive surface
    - mitigation path
    congruence_level: null
    reliability: 0.75
    refine_kind: null
  - id: 20260507-gate-review-single-envelope-predicate-any-unresolvable-indirection-in-execution-position-is-destructive
    type: gate:review
    content: |-
      Independent multi-model audit (tribunal: Codex high + Gemini flash) on the headline-only patch.
      Codex REJECT/CRITICAL with 5 findings (2 CRITICAL, 3 HIGH); Gemini CONCERNS/HIGH with 4 findings.
      All 9 reported bypasses verified empirically. The envelope-predicate hypothesis was selected as
      the response (this evidence layer is the gate-review record, not a re-audit of the implementation).
      Implementation lands a 12-case bypass corpus + 12-case negative corpus, all green via cargo test
      (253/253 in secguard-guard). Tribunal re-run on the implementation diff is the verification gate
      in the linked feature spec, not this decision-tier gate.

      Reviewer: random1st (arbiter role on tribunal). Auditors: Codex high, Gemini flash. Evidence files:
      /tmp/tribunal-codex.txt, /tmp/tribunal-gemini.txt.
    verdict: pass
    valid_until: 2026-08-05T20:24:56.466465+00:00
    carrier_ref: null
