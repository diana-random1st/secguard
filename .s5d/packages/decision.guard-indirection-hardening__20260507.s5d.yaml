context: |
  secguard's guard subcommand classifies a shell command as safe vs.
  destructive before an AI agent executes it. The pipeline is:
    policy → AST parse (tree-sitter-bash) → predicate rules → optional
    ML brain.

  The AST walker (crates/secguard-guard/src/ast.rs) flattens a source
  string into a list of EffectiveCommand records (argv, cwd, span,
  wrappers, remote, chrooted). Rules in rules.rs are pure predicates
  over that record stream.

  A verified bypass class breaks this:
    a="rm / -rf" && $a   →  pre-fix: safe
  Root cause: variable_assignment is dropped as env-prefix; $a surfaces
  as opaque simple_expansion; no rule matches the raw token "$a".

  Headline patch (current uncommitted state) added lexical bindings,
  textual $NAME/${NAME} expansion, and a __indirect_unresolved__ marker.
  Tribunal (Codex high + Gemini flash) verified 9 adjacent bypasses
  still open or newly opened:

  Block A — must-fix (small surface, 5 classes):
    1. a="$(echo rm) -rf /"; $a  →  parse_assignment binds opaque
       "$(echo rm) -rf /" because refusal of $-RHS only checks the
       first byte and "$(...)" starts with ".
    2. a=rm\ -rf\ /; $a  →  backslash-escapes in RHS not modeled.
    3. $(echo rm) -rf /  →  command_substitution as command head;
       contains_var_ref doesn't trigger; argv[0] elided.
    4. `rm -rf /`  →  backtick command substitution as head; same.
    5. r$a -rf /  (a="m")  →  prefix concat; argv[0]="r$a" doesn't
       start with $.

  Block B — security-meaningful (3 classes):
    6. bash <<< "$a"  →  here-string as shell input not modeled.
    7. source <(echo rm -rf /)  →  source/. not a wrapper.
    8. echo $(a="rm -rf /"); $a  →  command_substitution leaks
       binding into outer scope (real bash isolates).

  Block C — correctness/consistency (2 classes):
    9. f(){ a="rm -rf /"; }; a=ls; f; $a  →  function definition
       captures binding at definition time; real bash captures at
       call time. Inverted semantics.
    10. eval still uses old __eval_dynamic__ path even when a is
        bound; bash -c "$a" resolves via bindings; inconsistent.

  All 10 (incl. headline) verified empirically against the current
  binary. Tests: 323 pass on guard crate.

  This decision frames the AST contract for indirect commands BEFORE
  more code lands. The current patch is a partial fix that opened
  collateral while closing the headline. The tribunal explicitly
  asked for target-state reasoning; this spec records it.
