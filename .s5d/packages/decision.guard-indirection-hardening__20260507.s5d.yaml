- id: external-shell-verification-dry-run-via-bash-n-sandboxed-eval
  title: 'External shell verification: dry-run via `bash -n` / sandboxed eval'
  content: |-
    Delegate semantics to bash itself. For each input, run `bash -n` (no-exec syntax check) plus a
    sandboxed `set -x` trace via a constrained subprocess (read-only filesystem, no network, killed
    after a tight timeout) to capture which commands bash WOULD execute. Apply the existing rule
    predicates to that argv stream.

    Mechanism: subprocess invocation; ptrace or seccomp sandbox; PATH override to a stub directory
    where `rm`, `dd`, etc. are recorded but not executed; collect the trace; feed each captured argv
    through `rules::classify`.

    Trust level: bash is the source of truth for bash semantics. No tree-sitter blind spots, no
    walker maintenance. But: synchronous subprocess on every guard call (latency); sandbox escape
    risk; non-portable across macOS/Linux/Windows; doesn't see `read` / interactive input; agents
    running guard in non-bash shells (zsh/dash) get bash semantics not their own; tooling fragility
    (bash version differences).
  scope: crates/secguard-guard/ + new sandbox crate
  kind: system
  layer: invalid
  r_eff: null
  evidence:
  - id: 20260507-internal-external-shell-verification-dry-run-via-bash-n-sandboxed-eval
    type: internal
    content: |-
      Hard counter-evidence: `bash -n` only checks SYNTAX, it does not expand or trace. Real "what would
      execute" requires actual evaluation in a sandbox. Sandboxing bash safely on macOS/Linux/Windows is
      not a 30-LOC patch — it requires per-platform syscall filtering (seccomp on Linux, sandbox-exec on
      macOS, no equivalent on Windows). Latency: spinning a bash subprocess per guard call is ~10-50ms
      even on local; vs current AST parse at sub-millisecond. Threat model: a sandbox escape is now in
      the trust boundary — exactly the surface secguard exists to AVOID. Plus interactive constructs
      (`read`, command substitution that hits network, anything with stdin) cannot be evaluated at all
      because they have no input.
    verdict: fail
    valid_until: 2026-08-05T20:03:27.870827+00:00
    carrier_ref: null
    formality: 3
    claim_scope:
    - feasibility
    - security
    - latency
    congruence_level: null
    reliability: 0.9
    refine_kind: null
  depends_on: []
  rationale: null
  spec_ref: null
  prompt: Or should we abandon static analysis and let bash itself decide what runs?
  next_move: probe
