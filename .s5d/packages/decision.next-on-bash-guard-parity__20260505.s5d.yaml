context: |-
  After RAN-353 (commit 798130b — fixture corpus + shadow mode + rule_id telemetry)
  and RAN-354 (commit 3aa08c2 — token-level rm operand classifier), the bash-guard
  fixture baseline is 98/155 (63.2%). rm subgroup is 23/24 (96%). Remaining
  failures cluster in three buckets:

  Bucket-RuleFamily (~40 fixtures, 26% of corpus):
    supabase 0/10 (alembic / drizzle / prisma / knex / goose migrations)
    infra: 18 missing (terraform, mongo, redis, ES, gsutil, OCI/IBM/doctl)
    paas: 6 missing (doctl, linode-cli, fly volumes destroy)
    git: 9 missing (filter-branch, filter-repo, BFG, +refspec, push -d)
    db_client: 3 missing (redis FLUSHALL, psql DELETE FROM)

  Bucket-AST (~12 fixtures, 8% of corpus):
    sudo / bash -c / eval / xargs / find -exec / ssh / chroot wrappers

  Bucket-FP (~10 fixtures from substring fallback):
    `git commit -m "rm -rf ..."` etc — false positives

  RAN-355 (proposal 001) bundles AST + wrapper unwrap + asymmetric fail-open
  + pipe-to-shell re-parse. Fixture-coverage gain: at most +12. Cost: parser
  choice S5D, parser implementation, all rule families migrate to AST.
  Bucket-RuleFamily would still need to ship separately afterwards.
