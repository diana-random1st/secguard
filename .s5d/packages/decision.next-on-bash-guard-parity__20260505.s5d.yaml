hypotheses:
- id: rule-family-expansion-first
  title: Ship rule-family expansion first; defer AST
  content: |-
    Spend 2 weeks adding ~8-10 missing rule families and tightening
    substring FPs: supabase ORM migrations, terraform, redis FLUSH,
    mongo destructive, ES/OpenSearch DELETE, gsutil rm, OCI/IBM/doctl,
    git filter-branch/+refspec, plus tightening substring fallback to
    skip `git commit -m "..."` content. Each rule ~50 LOC + tests.
    Wrapper-FN bypass stays covered by current substring fallback
    (conservatively asks rather than misses). AST stays queued in
    proposal 001 for later.

    Predictions: fixture baseline rises to 130+/155 (84%+). rm subgroup
    holds at 23/24. Default-rule FPs drop from 10 to <5.

    Decomposition: weak coupling, low hidden state, high reuse, low risk.
    Mechanical work, well-bounded per rule.

    Rigor: empirical (fixture deltas measurable per rule). Counter-
    evidence: if a rule needs operand-aware parsing (mongo with JSON
    args) we hit AST territory before completing rules.

    Weakest link: wrapper-FN class stays open. An agent emitting
    `sudo rm -rf $HOME` is caught only by substring fallback, which
    flags any `rm -rf` substring as destructive — broadly safe but coarse.
  scope: secguard heuristic phase, no parser change
