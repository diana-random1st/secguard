- id: defer-collect-real-signal
  title: Defer both; ship 0.4.0 with current state, collect production telemetry
  content: |-
    Fixture corpus is bash-guard's view of threat space, not secguard's
    user base. Ship 0.4.0 with RAN-353/354. Encourage opt-in shadow mode
    for 4 weeks. Collect would_decide telemetry. Decide next chunk based
    on actual FN/FP distribution. Concrete next-2-weeks: fix worst 1-2
    FPs, add terraform if obvious, publish 0.4.0, write shadow adoption
    guide.

    Predictions: production telemetry shows different rule-family weights
    than fixtures imply. 0.4.0 shippable in 2-3 days. At least 3 user
    instances enable shadow mode within 4 weeks.

    Decomposition: minimal coupling, dependency on user adoption is real
    risk. Maximum reuse. Opportunity cost — delays both A and B by a month.

    Rigor: methodologically correct (instrument before optimizing).
    Practically risky if adoption low: we wait for data that never arrives
    then have to choose anyway, having burned 4 weeks.

    Weakest link: adoption. If only 1-2 users enable shadow mode, signal
    is too weak to drive confident next decision.
  scope: release + observability
