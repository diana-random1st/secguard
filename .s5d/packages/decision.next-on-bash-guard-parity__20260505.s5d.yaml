- id: ast-and-wrapper-unwrap
  title: Build AST + wrapper unwrap next (RAN-355 as originally scoped)
  content: |-
    Treat AST as the architectural foundation. Run separate S5D for
    parser choice (5 options in proposal 001). Implement minimum:
    parser/span abstraction + wrapper unwrap (sudo, bash -c, eval,
    xargs, find -exec, ssh, chroot, timeout, env, command, sh/zsh -c)
    + asymmetric fail-open + pipe-to-shell literal re-parse. Migrate
    rm.rs and heuristic.rs to consume parsed segments.

    Predictions: ~12 wrapper fixtures pass. Heredoc/quoted FPs drop
    via span classification. Parser S5D + spike + integration fits in
    2 weeks. All 49 tests still pass.

    Decomposition: tight coupling (every rule consuming raw string
    needs refactor). Parser library has unknown long-tail risks.
    Reuse low. Risk high — parser bugs become silent vulnerabilities.

    Rigor: theoretical case strong (bash-guard design rationale,
    tribunal #1 said AST should be first architectural target).
    Empirical gain modest (+12 fixtures). Long-term maintainability
    trades against short-term safety yield.

    Weakest link: parser choice. Rust ecosystem has no maintained
    bash-extension-aware parser. Every option has sharp edges.
    Without working spike, commit here is partly speculative.
