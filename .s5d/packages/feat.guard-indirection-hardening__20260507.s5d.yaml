  date: 2026-05-07
  tickets: []
  adrs: []
  renames: []
context: |
  ## Problem
  Variable indirection and command substitution in command position
  silently bypass the destructive-command guard. Headline (`a="rm /
  -rf" && $a`) closed by current uncommitted patch. Tribunal (Codex
  high + Gemini flash) verified 9 adjacent classes still produce
  false-negative `safe`. See decision.guard-indirection-hardening
  for the full inventory and the framing decision.

  ## Goal
  Implement the envelope predicate: any unresolvable indirection in
  execution position is destructive. Resolve when statically possible
  via lexical bindings + boot-time env; emit unified
  `__indirect_unresolved__` marker otherwise. Uniform across head,
  bash/sh/eval bodies, source argument, here-string body, and
  command-substitution that escapes its scope.

  ## Privacy
  Classification: Internal
workflow:
  mode: plan
  target_architecture:
    summary: |
      ast.rs Walker emits __indirect_unresolved__ for any execution-position
      construct (command head, bash/sh/eval body, source arg, here-string body,
      escaped command substitution) that contains expansion which expand_vars
      cannot fully resolve. Resolution sources: lexical bindings (current),
      boot-time process env for known-safe vars (HOME, PWD, EDITOR, PAGER, VISUAL,
      BROWSER, SHELL). Scope rules mirror bash: subshell `(...)`,
      command_substitution `$(...)`, process_substitution `<(...)`, and function
      bodies do NOT leak bindings. Function-body assignments are NOT recorded at
      definition time. eval body uses the same bindings path as bash -c (no
      separate __eval_dynamic__ branch when bindings resolve). The marker is
      destructive-with-reason, surfacing through the existing `IndirectUnresolved`
      RuleId.
    invariants:
    - indirect_command_no_silent_safe — every dynamic execution position resolves or marks
    - scope_isolation_matches_bash — subshell/$()/<()/function bodies do not leak bindings
    - bounded_envvar_trust — only boot-time env (not shell-set) feeds the safe-var allowlist
  delivery_strategy:
    summary: |
      One PR. Refactor the headline patch into the envelope predicate; add
      coverage for all 10 verified bypasses + ≥10 negatives; re-run tribunal.
    rationale: |
      The headline patch is uncommitted. Rolling it forward into the envelope
      design avoids two separate audit cycles. The envelope predicate is
      smaller than enumerating Block A+B+C separately.
