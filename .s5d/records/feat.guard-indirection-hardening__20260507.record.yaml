  heuristics:
  - 'Tribunal first, target-state spec second, code third. The headline patch alone produced a partial fix that introduced collateral; the envelope spec made the target invariant explicit, which made the v2 audit''s findings actionable in one PR instead of three. Specifically: when defining "any indirection in execution position is destructive", enumerate execution position upfront — not just argv[0], but body of every shell wrapper, every redirect that feeds executable input, and any token-decoding step that runs at parse time.'
