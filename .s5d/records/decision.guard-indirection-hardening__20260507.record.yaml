decision:
  title: Use envelope predicate for AST indirection contract
  winner_id: single-envelope-predicate-any-unresolvable-indirection-in-execution-position-is-destructive
  rejected_ids:
  - per-class-enumeration-explicit-ast-recognition-for-each-indirection-construct
  - external-shell-verification-dry-run-via-bash-n-sandboxed-eval
  context: Tribunal verdict REJECT on partial per-class fix; 9 adjacent bypasses verified empirically.
  decision: Adopt single envelope predicate — any unresolvable indirection in execution position emits __indirect_unresolved__. Lexical bindings + bounded boot-time env (HOME, PWD, EDITOR, PAGER, VISUAL, BROWSER, SHELL) drive resolution. Subshell, command_substitution, process_substitution, and function_definition isolate bindings.
  rationale: Asymmetric threat model — false negative catastrophic, false positive cheap (agent retry). Envelope matches existing __pipe_to_shell__ / __eval_dynamic__ patterns. Per-class enumeration historically misses 9/10 classes per fix. External shell verification fails feasibility (sandbox-escape in trust boundary, latency 10-50ms, can't handle interactive constructs).
  consequences: eval-vs-bash-c semantics unify; new RuleId::IndirectUnresolved variant covers all opaque-indirection cases; function-call mutation (f(){a=…}; f; $a) remains a known limitation — definition-time binding capture inverted from bash, documented in spec; downstream callers must accept the new RuleId.
  decided_at: 2026-05-07T20:25:58.935186+00:00
  confirmed_by: random1st
  expires_at: 2026-08-05
  do_list: []
  dont_list: []
  challenge:
    mode: standard
    passed: true
    summary: '5 probes survived: (1) false-positive UX kill mitigated by env-name allowlist + destructive-ask semantics; (2) HOME=/ poisoning mitigated by trusting only boot-time env, not shell-set; (3) "matches codebase" not load-bearing — decisive arg is threat-model fit; (4) allowlist maintenance (~10 names) << shell construct enumeration (~40 node kinds); (5) heuristic.rs allowlist mechanism is complementary, not alternative.'
    checks: []
